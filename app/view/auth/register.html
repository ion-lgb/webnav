{extend name="layout"}

{block name="title"}注册 - WebNav{/block}

{block name="css"}
<style>
.auth-card { animation: fadeInUp 0.4s ease-out; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
{/block}

{block name="content"}
<div class="min-h-[calc(100vh-10rem)] flex items-center justify-center px-4 py-12">
    <div class="auth-card w-full max-w-md">
        <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm border border-amber-100/40 p-8">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-amber-50 to-orange-50 border border-amber-200/60 mb-4">
                    <i class="fas fa-user-plus text-2xl text-amber-600"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">创建账号</h1>
                <p class="text-gray-500 mt-1 text-sm font-light">注册 WebNav 开始收藏网站</p>
            </div>

            {include file="partials/flash" /}

            <form action="/register" method="POST" class="space-y-5">
                {:token_field()}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">用户名</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" name="username" required placeholder="请输入用户名" class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/40 focus:border-amber-400 transition-all duration-200">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">邮箱</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="email" name="email" required placeholder="请输入邮箱" class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/40 focus:border-amber-400 transition-all duration-200">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">密码</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="password" name="password" required placeholder="请输入密码（至少6位）" class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/40 focus:border-amber-400 transition-all duration-200">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">确认密码</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="password" name="confirm_password" required placeholder="请再次输入密码" class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/40 focus:border-amber-400 transition-all duration-200">
                    </div>
                </div>

                <button type="submit" class="w-full py-2.5 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-xl text-sm font-medium hover:from-amber-600 hover:to-orange-600 shadow-sm hover:shadow-md focus:outline-none focus:ring-2 focus:ring-amber-500/40 focus:ring-offset-2 transition-all duration-200 cursor-pointer">
                    注册
                </button>
            </form>

            <p class="text-center text-sm text-gray-500 mt-6">
                已有账号？
                <a href="/login" class="text-amber-600 hover:text-amber-700 font-medium transition-colors duration-200">立即登录</a>
            </p>
        </div>
    </div>
</div>
{/block}
