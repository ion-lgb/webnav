{extend name="layout"}

{block name="title"}登录 - WebNav{/block}

{block name="css"}
<style>
.auth-card { animation: fadeInUp 0.4s ease-out; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
{/block}

{block name="content"}
<div style="min-height: calc(100vh - var(--nav-height) - 80px); display: flex; align-items: center; justify-content: center; padding: 40px 16px;">
    <div class="auth-card" style="width: 100%; max-width: 400px;">
        <div class="content-card" style="padding: 32px;">
            <div style="text-align: center; margin-bottom: 32px;">
                <div style="width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, var(--theme-color), var(--hover-color)); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 12px;">
                    <i class="fas fa-compass text-2xl text-white"></i>
                </div>
                <h1 class="text-2xl font-bold" style="color: var(--main-color);">欢迎回来</h1>
                <p style="color: var(--muted-color);" class="text-sm mt-1">登录你的 WebNav 账号</p>
            </div>

            {include file="partials/flash" /}

            <form action="/login" method="POST" class="space-y-5">
                {:token_field()}
                <div>
                    <label class="block text-sm font-medium mb-1.5" style="color: var(--muted-color2);">用户名</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-3.5 top-1/2 -translate-y-1/2" style="color: var(--muted-color); font-size: 14px;"></i>
                        <input type="text" name="username" required placeholder="请输入用户名" class="w-full pl-10 pr-4 py-2.5 border-0 rounded-xl text-sm outline-none" style="background: var(--body-bg); color: var(--main-color);">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1.5" style="color: var(--muted-color2);">密码</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2" style="color: var(--muted-color); font-size: 14px;"></i>
                        <input type="password" name="password" required placeholder="请输入密码" class="w-full pl-10 pr-4 py-2.5 border-0 rounded-xl text-sm outline-none" style="background: var(--body-bg); color: var(--main-color);">
                    </div>
                </div>
                <button type="submit" class="w-full py-2.5 rounded-xl text-sm font-medium text-white cursor-pointer transition-opacity hover:opacity-90" style="background: var(--theme-color);">
                    登录
                </button>
            </form>
            <p style="color: var(--muted-color);" class="text-center text-sm mt-6">
                还没有账号？
                <a href="/register" style="color: var(--theme-color);" class="font-medium cursor-pointer">立即注册</a>
            </p>
        </div>
    </div>
</div>
{/block}
