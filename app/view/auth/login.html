{extend name="layout"}

{block name="title"}登录 - WebNav{/block}

{block name="css"}
<style>
.auth-card { animation: fadeInUp 0.4s ease-out; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
{/block}

{block name="content"}
<div class="min-h-[calc(100vh-10rem)] flex items-center justify-center px-4 py-12">
    <div class="auth-card w-full max-w-md">
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-100 rounded-full mb-4">
                    <i class="fas fa-compass text-2xl text-indigo-600"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">欢迎回来</h1>
                <p class="text-gray-500 mt-1 text-sm">登录你的 WebNav 账号</p>
            </div>

            {if condition="$error ?? ''"}
            <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2">
                <i class="fas fa-exclamation-circle text-red-500"></i>
                <span class="text-sm text-red-700">{$error}</span>
            </div>
            {/if}

            <form action="/login" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">用户名</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" name="username" required placeholder="请输入用户名" class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">密码</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="password" name="password" required placeholder="请输入密码" class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
                    </div>
                </div>

                <button type="submit" class="w-full py-2.5 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-all">
                    登录
                </button>
            </form>

            <p class="text-center text-sm text-gray-500 mt-6">
                还没有账号？
                <a href="/register" class="text-indigo-600 hover:text-indigo-700 font-medium transition-colors">立即注册</a>
            </p>
        </div>
    </div>
</div>
{/block}
