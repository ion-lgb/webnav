{extend name="../admin_layout"}

{block name="title"}编辑页面 - WebNav 管理后台{/block}

{block name="breadcrumb"}
<i class="fas fa-chevron-right text-xs mx-1"></i>
<a href="/admin/pages" class="hover:text-indigo-600 transition-colors">页面管理</a>
<i class="fas fa-chevron-right text-xs mx-1"></i>
<span class="text-gray-600">编辑 {$page.title}</span>
{/block}

{block name="content"}
{if session('error')}
<div class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2 text-red-700">
    <i class="fas fa-exclamation-circle"></i>
    <span>{:session('error')}</span>
</div>
{/if}

<div class="bg-white rounded-xl shadow-sm">
    <div class="px-6 py-4 border-b border-gray-100">
        <h2 class="text-lg font-semibold text-gray-900">编辑: {$page.title}</h2>
    </div>

    <form action="/admin/page/edit/{$page.id}" method="POST" class="p-6 space-y-5">
        {:token_field()}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">页面标题</label>
            <input type="text" name="title" value="{$page.title}" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">页面内容 (HTML)</label>
            <textarea name="content" rows="20" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all font-mono">{$page.content}</textarea>
        </div>
        <div class="flex items-center gap-3">
            <button type="submit" class="px-6 py-2.5 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors">
                <i class="fas fa-save mr-1"></i>保存修改
            </button>
            <a href="/admin/pages" class="px-6 py-2.5 border border-gray-200 text-gray-600 rounded-lg text-sm hover:bg-gray-50 transition-colors">取消</a>
        </div>
    </form>
</div>
{/block}
