{extend name="layout"}

{block name="title"}搜索: {$keyword} - WebNav{/block}

{block name="content"}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-900">
            搜索: <span class="text-indigo-600">{$keyword}</span>
        </h1>
        <p class="text-gray-500 mt-1">共找到 {$count|default=0} 个结果</p>
    </div>

    {if condition="$sites && count($sites) > 0"}
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
        {foreach $sites as $site}
        {include file="partials/site_card" /}
        {/foreach}
    </div>
    {else}
    <div class="text-center py-20">
        <i class="fas fa-search text-5xl text-gray-300 mb-4"></i>
        <p class="text-gray-400 text-lg">未找到相关网站</p>
        <a href="/" class="mt-4 inline-block text-indigo-600 hover:text-indigo-700 transition-colors">
            <i class="fas fa-arrow-left mr-1"></i>返回首页
        </a>
    </div>
    {/if}
</div>
{/block}
