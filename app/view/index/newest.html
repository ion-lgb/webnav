{extend name="layout"}

{block name="title"}最新收录 - WebNav{/block}

{block name="content"}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-900 flex items-center gap-2">
            <i class="fas fa-clock text-indigo-600"></i>
            最新收录
        </h1>
        <p class="text-gray-500 mt-1">最近添加的网站</p>
    </div>

    {if condition="!$sites->isEmpty()"}
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
        {foreach $sites as $site}
        {include file="partials/site_card" /}
        {/foreach}
    </div>
    <div class="mt-8 flex justify-center">
        {$sites|raw}
    </div>
    {else}
    <div class="text-center py-20">
        <i class="fas fa-clock text-5xl text-gray-300 mb-4"></i>
        <p class="text-gray-400 text-lg">暂无收录网站</p>
        <a href="/" class="mt-4 inline-block text-indigo-600 hover:text-indigo-700 transition-colors">
            <i class="fas fa-arrow-left mr-1"></i>返回首页
        </a>
    </div>
    {/if}
</div>
{/block}
