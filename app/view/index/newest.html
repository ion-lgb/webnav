{extend name="layout"}

{block name="title"}最新收录 - WebNav{/block}

{block name="content"}
<div class="content-card">
    <div class="cat-header">
        <div class="cat-icon"><i class="fas fa-clock"></i></div>
        <h2>最新收录</h2>
    </div>
    {if condition="!$sites->isEmpty()"}
    <div class="site-grid">
        {foreach $sites as $site}
        <a href="/redirect?url={$site.url}" target="_blank" class="site-card">
            <div class="site-card-icon">
                <img src="{if $site.icon_url}{$site.icon_url}{else}/static/default-favicon.svg{/if}" alt="" onerror="this.src='/static/default-favicon.svg'">
            </div>
            <div class="site-card-info">
                <div class="site-card-title">{$site.title}</div>
                <div class="site-card-desc">{$site.description|default=''}</div>
            </div>
        </a>
        {/foreach}
    </div>
    <div class="pagination" style="margin-top:20px;">{$sites|raw}</div>
    {else}
    <div class="empty-state">
        <div class="empty-icon"><i class="fas fa-clock"></i></div>
        <h3>暂无收录</h3>
        <p>还没有添加任何网站</p>
    </div>
    {/if}
</div>
{/block}
