{extend name="layout"}

{block name="title"}{$title} - WebNav{/block}

{block name="content"}
<div style="margin-top: 24px; max-width: 800px; margin-left: auto; margin-right: auto;">
    <div class="content-card">
        <h1 class="text-2xl font-bold mb-6" style="color: var(--main-color);">{$title}</h1>
        <div class="prose max-w-none leading-relaxed" style="color: var(--muted-color2);">
            {$content|raw}
        </div>
        {if $updated_at}
        <p class="text-xs mt-8 pt-4" style="color: var(--muted-color); border-top: 1px solid var(--border-color);">最后更新: {$updated_at}</p>
        {/if}
    </div>
</div>
{/block}
