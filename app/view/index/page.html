{extend name="layout"}

{block name="title"}{$title} - WebNav{/block}

{block name="content"}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm border border-amber-100/40 p-6 sm:p-10">
        <h1 class="text-2xl font-bold text-gray-900 mb-8 tracking-tight">{$title}</h1>
        <div class="prose max-w-none text-gray-700 leading-relaxed">
            {$content|raw}
        </div>
        {if $updated_at}
        <p class="text-xs text-gray-400 mt-10 pt-4 border-t border-gray-100">最后更新: {$updated_at}</p>
        {/if}
    </div>
</div>
{/block}
