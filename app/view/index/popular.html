{extend name="layout"}

{block name="title"}热门网站 - WebNav{/block}

{block name="content"}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="mb-10">
        <div class="flex items-center gap-3 mb-2">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-orange-50 to-red-50 border border-orange-200/60 flex items-center justify-center">
                <i class="fas fa-fire text-orange-500"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">热门网站</h1>
        </div>
        <p class="text-gray-500 ml-[52px]">点击量最高的网站</p>
    </div>

    {if condition="!$sites->isEmpty()"}
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">
        {foreach $sites as $site}
        {include file="partials/site_card" /}
        {/foreach}
    </div>
    <div class="mt-12 flex justify-center">
        {$sites|raw}
    </div>
    {else}
    <div class="text-center py-24">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-orange-50 to-red-50 border border-orange-200/60 mb-6">
            <i class="fas fa-fire text-3xl text-orange-400"></i>
        </div>
        <h3 class="text-xl font-semibold text-gray-800 mb-2">暂无热门</h3>
        <p class="text-gray-400 mb-6 font-light">还没有任何点击数据</p>
        <a href="/" class="inline-flex items-center gap-2 text-amber-600 hover:text-amber-700 transition-colors duration-200 cursor-pointer font-medium">
            <i class="fas fa-arrow-left text-xs"></i>返回首页
        </a>
    </div>
    {/if}
</div>
{/block}
