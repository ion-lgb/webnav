{extend name="layout"}

{block name="title"}热门网站 - WebNav{/block}

{block name="content"}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-gray-900 flex items-center gap-2 tracking-tight">
            <i class="fas fa-fire text-orange-500"></i>
            热门网站
        </h1>
        <p class="text-gray-500 mt-1">点击量最高的网站</p>
    </div>

    {if condition="!$sites->isEmpty()"}
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">
        {foreach $sites as $site}
        {include file="partials/site_card" /}
        {/foreach}
    </div>
    <div class="mt-10 flex justify-center">
        {$sites|raw}
    </div>
    {else}
    <div class="text-center py-20">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gray-100 mb-6">
            <i class="fas fa-fire text-3xl text-gray-400"></i>
        </div>
        <h3 class="text-lg font-medium text-gray-700 mb-2">暂无热门</h3>
        <p class="text-gray-400 mb-6">还没有任何点击数据</p>
        <a href="/" class="inline-flex items-center gap-1 text-indigo-600 hover:text-indigo-700 transition-colors duration-200 cursor-pointer">
            <i class="fas fa-arrow-left text-xs"></i>返回首页
        </a>
    </div>
    {/if}
</div>
{/block}
