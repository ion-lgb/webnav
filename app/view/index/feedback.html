{extend name="layout"}

{block name="title"}用户反馈 - WebNav{/block}

{block name="content"}
<div style="margin-top: 24px; max-width: 640px; margin-left: auto; margin-right: auto;">
    <div class="content-card">
        <div class="cat-title mb-6">
            <i class="fas fa-comments" style="color: var(--theme-color);"></i>
            <h2>用户反馈</h2>
        </div>
        <p style="color: var(--muted-color);" class="text-sm mb-6">你的意见对我们很重要，欢迎提出宝贵建议</p>

        {if isset($success)}
        <div style="text-align: center; padding: 40px 20px;">
            <div style="width: 64px; height: 64px; border-radius: 16px; background: rgba(46,204,113,0.1); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 16px;">
                <i class="fas fa-check-circle text-2xl" style="color: #2ecc71;"></i>
            </div>
            <h3 class="text-lg font-semibold mb-2" style="color: var(--main-color);">提交成功</h3>
            <p style="color: var(--muted-color);" class="mb-6">{$success}</p>
            <a href="/" style="background: var(--theme-color); color: #fff;" class="inline-flex items-center gap-2 px-5 py-2 rounded-full text-sm font-medium cursor-pointer hover:opacity-90 transition-opacity"><i class="fas fa-arrow-left text-xs"></i>返回首页</a>
        </div>
        {else}
        {include file="partials/flash" /}

        <form action="/feedback" method="POST" class="space-y-5">
            {:token_field()}
            <div>
                <label class="block text-sm font-medium mb-1.5" style="color: var(--muted-color2);">称呼</label>
                <input type="text" name="name" placeholder="你的名字（可选）" value="{$user.username|default=''}" class="w-full px-4 py-2.5 border-0 rounded-xl text-sm outline-none transition-all" style="background: var(--body-bg); color: var(--main-color);">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1.5" style="color: var(--muted-color2);">邮箱</label>
                <input type="email" name="email" placeholder="联系邮箱（可选）" value="{$user.email|default=''}" class="w-full px-4 py-2.5 border-0 rounded-xl text-sm outline-none transition-all" style="background: var(--body-bg); color: var(--main-color);">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1.5" style="color: var(--muted-color2);">反馈内容 <span style="color: var(--theme-color);">*</span></label>
                <link rel="stylesheet" href="/static/css/quill.snow.css">
                <textarea name="content" id="contentTextarea" class="hidden" required></textarea>
                <div id="editor" style="min-height:200px"></div>
            </div>
            <button type="submit" class="w-full py-2.5 rounded-xl text-sm font-medium text-white cursor-pointer transition-opacity hover:opacity-90" style="background: var(--theme-color);">
                <i class="fas fa-paper-plane mr-1"></i>提交反馈
            </button>
        </form>
        {/if}
    </div>
</div>
{/block}

{block name="js"}
<script src="/static/js/quill.js"></script>
<script>
var quill = new Quill('#editor', {
    theme: 'snow',
    modules: {
        toolbar: [
            ['bold', 'italic'],
            [{ list: 'ordered' }, { list: 'bullet' }],
            ['link', 'blockquote'],
            ['clean']
        ]
    }
});
quill.on('text-change', function() {
    document.getElementById('contentTextarea').value = quill.root.innerHTML;
});
</script>
{/block}
