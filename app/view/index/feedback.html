{extend name="layout"}

{block name="title"}用户反馈 - WebNav{/block}

{block name="content"}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm border border-amber-100/40 p-6 sm:p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-2 flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-50 to-orange-50 border border-amber-200/60 flex items-center justify-center">
                <i class="fas fa-comments text-amber-600"></i>
            </div>
            用户反馈
        </h1>
        <p class="text-gray-500 text-sm mb-6 ml-[52px]">你的意见对我们很重要，欢迎提出宝贵建议</p>

        {if isset($success)}
        <div class="text-center py-16">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-green-50 to-emerald-50 border border-green-200/60 mb-6">
                <i class="fas fa-check-circle text-3xl text-green-500"></i>
            </div>
            <h2 class="text-xl font-semibold text-gray-800 mb-2">提交成功</h2>
            <p class="text-gray-500 mb-8">{$success}</p>
            <a href="/" class="inline-flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-xl text-sm font-medium hover:from-amber-600 hover:to-orange-600 shadow-sm transition-all duration-200 cursor-pointer">
                <i class="fas fa-arrow-left text-xs"></i>返回首页
            </a>
        </div>
        {else}
        {include file="partials/flash" /}

        <form action="/feedback" method="POST" class="space-y-5">
            {:token_field()}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">称呼</label>
                <input type="text" name="name" placeholder="你的名字（可选）" value="{$user.username|default=''}" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/40 focus:border-amber-400 transition-all duration-200 bg-white">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">邮箱</label>
                <input type="email" name="email" placeholder="联系邮箱（可选）" value="{$user.email|default=''}" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/40 focus:border-amber-400 transition-all duration-200 bg-white">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">
                    反馈内容 <span class="text-red-500">*</span>
                </label>
                <link rel="stylesheet" href="/static/css/quill.snow.css">
                <textarea name="content" id="contentTextarea" class="hidden" required></textarea>
                <div id="editor" style="min-height:200px"></div>
            </div>
            <button type="submit" class="w-full py-2.5 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-xl text-sm font-medium hover:from-amber-600 hover:to-orange-600 shadow-sm transition-all duration-200 cursor-pointer">
                <i class="fas fa-paper-plane mr-1"></i>提交反馈
            </button>
        </form>
        {/if}
    </div>
</div>
{/block}

{block name="js"}
<script src="/static/js/quill.js"></script>
<script>
var quill = new Quill('#editor', {
    theme: 'snow',
    modules: {
        toolbar: [
            ['bold', 'italic'],
            [{ list: 'ordered' }, { list: 'bullet' }],
            ['link', 'blockquote'],
            ['clean']
        ]
    }
});
quill.on('text-change', function() {
    document.getElementById('contentTextarea').value = quill.root.innerHTML;
});
</script>
{/block}
