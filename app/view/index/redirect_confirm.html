{extend name="layout"}
{block name="title"}即将离开 WebNav{/block}
{block name="content"}
<div style="margin-top: 80px; max-width: 480px; margin-left: auto; margin-right: auto; text-align: center;">
    <div class="content-card" style="padding: 40px 24px;">
        <div style="width: 64px; height: 64px; border-radius: 16px; background: rgba(241,192,64,0.1); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 16px;">
            <i class="fas fa-external-link-alt text-2xl" style="color: #f1c040;"></i>
        </div>
        <h1 class="text-xl font-bold mb-2" style="color: var(--main-color);">即将离开 WebNav</h1>
        <p style="color: var(--muted-color);" class="mb-4">你正要访问以下外部链接：</p>
        <div style="background: var(--body-bg); border-radius: 12px; padding: 12px; margin-bottom: 20px; word-break: break-all; font-size: 13px; font-family: monospace; color: var(--muted-color2);">{$targetUrl}</div>
        <p style="color: var(--muted-color);" class="text-sm mb-6">请确认该链接安全后再继续</p>
        <div class="flex justify-center gap-3">
            <a href="{$targetUrl}" target="_blank" rel="noopener noreferrer" class="px-6 py-2.5 rounded-xl text-sm font-medium text-white cursor-pointer transition-opacity hover:opacity-90" style="background: var(--theme-color);">确认前往</a>
            <a href="/" class="px-6 py-2.5 rounded-xl text-sm font-medium cursor-pointer" style="background: var(--body-bg); color: var(--muted-color2);">返回首页</a>
        </div>
    </div>
</div>
{/block}
