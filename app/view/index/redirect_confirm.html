{extend name="layout"}
{block name="title"}即将离开 WebNav{/block}
{block name="content"}
<div class="max-w-lg mx-auto px-4 py-20 text-center">
    <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm border border-amber-100/40 p-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-yellow-50 to-amber-50 border border-yellow-200/60 mb-6">
            <i class="fas fa-external-link-alt text-2xl text-yellow-600"></i>
        </div>
        <h1 class="text-xl font-bold text-gray-900 mb-2">即将离开 WebNav</h1>
        <p class="text-gray-500 mb-4">你正要访问以下外部链接：</p>
        <div class="bg-gray-50 rounded-xl p-4 mb-6 break-all text-sm text-gray-700 font-mono border border-gray-100">
            {$targetUrl}
        </div>
        <p class="text-sm text-gray-400 mb-6">请确认该链接安全后再继续</p>
        <div class="flex justify-center gap-3">
            <a href="{$targetUrl}" target="_blank" rel="noopener noreferrer" class="px-6 py-2.5 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-xl text-sm font-medium hover:from-amber-600 hover:to-orange-600 shadow-sm transition-all duration-200 cursor-pointer">
                确认前往
            </a>
            <a href="/" class="px-6 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm font-medium hover:bg-gray-200 transition-colors duration-200 cursor-pointer">
                返回首页
            </a>
        </div>
    </div>
</div>
{/block}
