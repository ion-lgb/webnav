<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{block name="title"}WebNav 管理后台{/block}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    {block name="css"}{/block}
</head>
<body class="bg-gray-100 min-h-screen">
    <aside class="fixed left-0 top-0 bottom-0 w-64 bg-gray-800 text-white flex flex-col z-50">
        <div class="h-16 flex items-center px-6 border-b border-gray-700">
            <a href="/admin" class="flex items-center gap-2 text-lg font-bold text-white hover:text-indigo-400 transition-colors">
                <i class="fas fa-compass text-xl"></i>
                <span>WebNav Admin</span>
            </a>
        </div>

        <nav class="flex-1 py-4 overflow-y-auto">
            <div class="px-6 mb-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">主菜单</div>

            <a href="/admin" class="flex items-center gap-3 px-6 py-2.5 text-sm text-gray-300 hover:bg-gray-700 hover:text-white transition-colors">
                <i class="fas fa-tachometer-alt w-5 text-center"></i>
                <span>仪表盘</span>
            </a>

            <a href="/admin/categories" class="flex items-center gap-3 px-6 py-2.5 text-sm text-gray-300 hover:bg-gray-700 hover:text-white transition-colors">
                <i class="fas fa-folder-open w-5 text-center"></i>
                <span>分类管理</span>
            </a>

            <a href="/admin/sites" class="flex items-center gap-3 px-6 py-2.5 text-sm text-gray-300 hover:bg-gray-700 hover:text-white transition-colors">
                <i class="fas fa-globe w-5 text-center"></i>
                <span>网站管理</span>
            </a>

            <a href="/admin/users" class="flex items-center gap-3 px-6 py-2.5 text-sm text-gray-300 hover:bg-gray-700 hover:text-white transition-colors">
                <i class="fas fa-users w-5 text-center"></i>
                <span>用户管理</span>
            </a>

            <a href="/admin/stats" class="flex items-center gap-3 px-6 py-2.5 text-sm text-gray-300 hover:bg-gray-700 hover:text-white transition-colors">
                <i class="fas fa-chart-bar w-5 text-center"></i>
                <span>点击统计</span>
            </a>

            <div class="mt-4 px-6 mb-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">其他</div>

            <a href="/" class="flex items-center gap-3 px-6 py-2.5 text-sm text-gray-300 hover:bg-gray-700 hover:text-white transition-colors">
                <i class="fas fa-external-link-alt w-5 text-center"></i>
                <span>返回前台</span>
            </a>
        </nav>

        <div class="p-4 border-t border-gray-700">
            <div class="flex items-center gap-3 px-2">
                <div class="w-8 h-8 bg-indigo-500 rounded-full flex items-center justify-center text-sm font-bold">
                    {$admin.username ?? 'A'}
                </div>
                <div class="flex-1 min-w-0">
                    <div class="text-sm font-medium truncate">{$admin.username ?? 'Admin'}</div>
                    <div class="text-xs text-gray-400">管理员</div>
                </div>
                <a href="/admin/logout" class="text-gray-400 hover:text-white transition-colors" title="退出登录">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </div>
    </aside>

    <div class="ml-64 min-h-screen flex flex-col">
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="flex items-center justify-between h-14 px-6">
                <div class="flex items-center gap-2 text-sm text-gray-500">
                    <a href="/admin" class="hover:text-indigo-600 transition-colors">首页</a>
                    {block name="breadcrumb"}{/block}
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-sm text-gray-500">{:date('Y-m-d H:i')}</span>
                </div>
            </div>
        </header>

        <main class="flex-1 p-6">
            {block name="content"}{/block}
        </main>

        <footer class="py-4 text-center text-xs text-gray-400">
            &copy; 2026 WebNav Admin
        </footer>
    </div>

    {block name="js"}{/block}
</body>
</html>
