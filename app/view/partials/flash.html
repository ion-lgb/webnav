{if isset($error)}
<div style="background: rgba(231,76,60,0.08); border: 1px solid rgba(231,76,60,0.2); border-radius: 12px; padding: 12px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;">
    <i class="fas fa-exclamation-circle" style="color: #e74c3c; font-size: 14px;"></i>
    <span class="text-sm" style="color: #c0392b;">{$error}</span>
</div>
{/if}
{if isset($success)}
<div style="background: rgba(46,204,113,0.08); border: 1px solid rgba(46,204,113,0.2); border-radius: 12px; padding: 12px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;">
    <i class="fas fa-check-circle" style="color: #2ecc71; font-size: 14px;"></i>
    <span class="text-sm" style="color: #27ae60;">{$success}</span>
</div>
{/if}
