{if isset($error)}
<div class="mb-5 p-4 bg-red-50/80 border border-red-200/60 rounded-xl flex items-center gap-2.5 backdrop-blur-sm">
    <div class="w-6 h-6 rounded-lg bg-red-100 flex items-center justify-center flex-shrink-0">
        <i class="fas fa-exclamation-circle text-red-500 text-xs"></i>
    </div>
    <span class="text-sm text-red-700">{$error}</span>
</div>
{/if}
{if isset($success)}
<div class="mb-5 p-4 bg-green-50/80 border border-green-200/60 rounded-xl flex items-center gap-2.5 backdrop-blur-sm">
    <div class="w-6 h-6 rounded-lg bg-green-100 flex items-center justify-center flex-shrink-0">
        <i class="fas fa-check-circle text-green-500 text-xs"></i>
    </div>
    <span class="text-sm text-green-700">{$success}</span>
</div>
{/if}
