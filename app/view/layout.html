<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{block name="title"}WebNav - 网址导航{/block}</title>
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <link rel="stylesheet" href="/static/css/fa.css">
    {block name="css"}{/block}
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <nav class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-gray-100/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-8">
                    <a href="/" class="flex items-center gap-2 text-xl font-bold text-indigo-600 hover:text-indigo-700 transition-colors duration-200">
                        <i class="fas fa-compass text-2xl"></i>
                        <span>WebNav</span>
                    </a>
                    <div class="hidden sm:flex items-center gap-1">
                        <a href="/" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-indigo-600 hover:bg-indigo-50/50 rounded-lg transition-all duration-200 cursor-pointer">首页</a>
                        <a href="/newest" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-indigo-600 hover:bg-indigo-50/50 rounded-lg transition-all duration-200 cursor-pointer">最新</a>
                        <a href="/popular" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-indigo-600 hover:bg-indigo-50/50 rounded-lg transition-all duration-200 cursor-pointer">热门</a>
                    </div>
                </div>

                <div class="flex-1 max-w-md mx-4 hidden sm:block">
                    <form action="/search" method="GET" class="relative">
                        <input type="text" name="keyword" placeholder="搜索网站..." class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 bg-gray-50/80 transition-all duration-200 cursor-text">
                        <button type="submit" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-indigo-500 transition-colors duration-200 cursor-pointer">
                            <i class="fas fa-search text-sm"></i>
                        </button>
                    </form>
                </div>

                <div class="flex items-center gap-3">
                    {if session('user_id')}
                    <div class="relative group">
                        <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100/80 transition-colors duration-200 cursor-pointer focus:outline-none focus:ring-2 focus:ring-indigo-500/50">
                            <i class="fas fa-user-circle text-gray-600"></i>
                            <span class="text-sm text-gray-700 hidden sm:inline">{$user.username|default='用户'}</span>
                            <i class="fas fa-chevron-down text-xs text-gray-400 transition-transform duration-200 group-hover:rotate-180"></i>
                        </button>
                        <div class="absolute right-0 mt-1 w-40 bg-white/95 backdrop-blur-md rounded-xl shadow-lg border border-gray-100/50 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
                            <a href="/bookmarks" class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 rounded-t-xl transition-colors duration-150 cursor-pointer">
                                <i class="fas fa-bookmark w-4"></i>
                                <span>我的书签</span>
                            </a>
                            {if $user.role == 'admin'}
                            <a href="/admin" class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 transition-colors duration-150 cursor-pointer">
                                <i class="fas fa-cog w-4"></i>
                                <span>管理后台</span>
                            </a>
                            {/if}
                            <hr class="border-gray-100">
                            <a href="/logout" class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-red-50 hover:text-red-600 rounded-b-xl transition-colors duration-150 cursor-pointer">
                                <i class="fas fa-sign-out-alt w-4"></i>
                                <span>退出登录</span>
                            </a>
                        </div>
                    </div>
                    {else}
                    <a href="/login" class="px-4 py-1.5 text-sm font-medium text-gray-600 hover:text-indigo-600 hover:bg-gray-100 rounded-lg transition-all duration-200 cursor-pointer">登录</a>
                    <a href="/register" class="px-4 py-1.5 text-sm font-medium text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 shadow-sm hover:shadow-md transition-all duration-200 cursor-pointer">注册</a>
                    {/if}
                </div>
            </div>

            <div class="sm:hidden pb-3">
                    <form action="/search" method="GET" class="relative">
                        <input type="text" name="keyword" placeholder="搜索网站..." class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 bg-gray-50/80 transition-all duration-200">
                        <button type="submit" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 cursor-pointer">
                            <i class="fas fa-search text-sm"></i>
                        </button>
                    </form>
            </div>
        </div>
    </nav>

    <main class="flex-1">
        {block name="content"}{/block}
    </main>

    <footer class="bg-white/80 backdrop-blur-sm border-t border-gray-100/50 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-2 text-gray-400">
                    <i class="fas fa-compass"></i>
                    <span class="text-sm">&copy; 2026 WebNav</span>
                </div>
                <div class="flex items-center gap-6 text-sm text-gray-400">
                    <a href="/about" class="hover:text-indigo-500 transition-colors duration-200 cursor-pointer">关于</a>
                    <a href="/feedback" class="hover:text-indigo-500 transition-colors duration-200 cursor-pointer">反馈</a>
                    <a href="/privacy" class="hover:text-indigo-500 transition-colors duration-200 cursor-pointer">隐私政策</a>
                </div>
            </div>
        </div>
    </footer>

    {block name="js"}{/block}
</body>
</html>
