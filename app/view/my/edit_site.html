{extend name="layout"}

{block name="title"}编辑网站 - WebNav{/block}

{block name="content"}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-6">
        <a href="/my" class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-indigo-600 transition-colors">
            <i class="fas fa-arrow-left text-xs"></i>
            <span>返回我的书签</span>
        </a>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 sm:p-8">
        <h1 class="text-xl font-bold text-gray-900 mb-6 flex items-center gap-2">
            <i class="fas fa-edit text-indigo-600"></i>
            <span>编辑网站</span>
        </h1>

        {if condition="$error ?? ''"}
        <div class="mb-5 p-3 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2">
            <i class="fas fa-exclamation-circle text-red-500"></i>
            <span class="text-sm text-red-700">{$error}</span>
        </div>
        {/if}

        <form action="/my/editSite/{$site.id}" method="POST" class="space-y-5">
            {:token_field()}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">网站标题 <span class="text-red-500">*</span></label>
                <input type="text" name="title" required value="{$site.title}" placeholder="例如：GitHub" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">网站地址 <span class="text-red-500">*</span></label>
                <div class="flex gap-2">
                    <input type="url" name="url" id="siteUrl" required value="{$site.url}" placeholder="https://github.com" class="flex-1 px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all" onblur="autoFillIcon()">
                    <button type="button" onclick="autoFillIcon()" class="px-3 py-2.5 bg-gray-100 text-gray-600 text-sm rounded-lg hover:bg-gray-200 transition-colors whitespace-nowrap">
                        <i class="fas fa-magic mr-1"></i>自动图标
                    </button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">图标地址</label>
                <div class="flex items-center gap-3">
                    <input type="text" name="icon_url" id="iconUrl" value="{$site.icon_url|default=''}" placeholder="留空则自动获取" class="flex-1 px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
                    <img id="iconPreview" src="{$site.icon_url|default=''}" alt="" class="w-8 h-8 rounded" onerror="this.classList.add('hidden')">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">简介</label>
                <textarea name="description" rows="3" placeholder="简要描述该网站..." class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all resize-none">{$site.description|default=''}</textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">所属分类 <span class="text-red-500">*</span></label>
                <select name="category_id" required class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all bg-white">
                    <option value="">请选择分类</option>
                    {if condition="$categories"}
                    <optgroup label="我的分类">
                        {foreach $categories as $cat}
                        <option value="{$cat.id}" {if condition="$cat.id == $site.category_id"}selected{/if}>{$cat.name}</option>
                        {/foreach}
                    </optgroup>
                    {/if}
                </select>
            </div>

            <div class="flex items-center gap-3">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="is_public" value="1" {if condition="$site.is_public == 1"}checked{/if} class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                    <span class="text-sm text-gray-700">公开显示</span>
                </label>
            </div>

            <div class="flex gap-3 pt-2">
                <a href="/my" class="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium text-center hover:bg-gray-200 transition-colors">取消</a>
                <button type="submit" class="flex-1 py-2.5 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors">保存</button>
            </div>
        </form>
    </div>
</div>
{/block}

{block name="js"}
<script>
function autoFillIcon() {
    var urlInput = document.getElementById('siteUrl');
    var iconInput = document.getElementById('iconUrl');
    var iconPreview = document.getElementById('iconPreview');
    try {
        var url = new URL(urlInput.value);
        var faviconUrl = 'https://www.google.com/s2/favicons?domain=' + url.hostname + '&sz=32';
        iconInput.value = faviconUrl;
        iconPreview.src = faviconUrl;
        iconPreview.classList.remove('hidden');
    } catch(e) {}
}
</script>
{/block}
