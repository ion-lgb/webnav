{extend name="layout"}

{block name="title"}编辑网站 - WebNav{/block}

{block name="content"}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="mb-6">
        <a href="/my" class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-amber-600 transition-colors duration-200 cursor-pointer">
            <i class="fas fa-arrow-left text-xs"></i>
            <span>返回我的书签</span>
        </a>
    </div>

    <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm border border-amber-100/40 p-6 sm:p-8">
        <h1 class="text-xl font-bold text-gray-900 mb-6 flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-50 to-orange-50 border border-amber-200/60 flex items-center justify-center">
                <i class="fas fa-edit text-amber-600"></i>
            </div>
            编辑网站
        </h1>

        {include file="partials/flash" /}

        <form action="/my/editSite/{$site.id}" method="POST" class="space-y-5">
            {:token_field()}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">网站标题 <span class="text-red-500">*</span></label>
                <input type="text" name="title" required value="{$site.title}" placeholder="例如：GitHub" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/40 focus:border-amber-400 transition-all duration-200">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">网站地址 <span class="text-red-500">*</span></label>
                <div class="flex gap-2">
                    <input type="url" name="url" id="siteUrl" required value="{$site.url}" placeholder="https://github.com" class="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/40 focus:border-amber-400 transition-all duration-200">
                    <button type="button" id="autoFillBtn" onclick="autoFill()" class="px-4 py-2.5 bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200/60 text-amber-700 text-sm rounded-xl hover:from-amber-100 hover:to-orange-100 transition-all duration-200 whitespace-nowrap cursor-pointer font-medium">
                        <i class="fas fa-wand-magic-sparkles mr-1"></i>智能填充
                    </button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">图标地址</label>
                <div class="flex items-center gap-3">
                    <input type="text" name="icon_url" id="iconUrl" value="{$site.icon_url|default=''}" placeholder="留空则自动获取" class="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/40 focus:border-amber-400 transition-all duration-200">
                    <img id="iconPreview" src="{$site.icon_url|default=''}" alt="" class="w-9 h-9 rounded-lg shadow-sm" onerror="this.classList.add('hidden')">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">简介</label>
                <textarea name="description" rows="3" placeholder="简要描述该网站..." class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/40 focus:border-amber-400 transition-all duration-200 resize-none">{$site.description|default=''}</textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">所属分类 <span class="text-red-500">*</span></label>
                <select name="category_id" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/40 focus:border-amber-400 transition-all duration-200 bg-white">
                    <option value="">请选择分类</option>
                    {if condition="$categories"}
                    <optgroup label="我的分类">
                        {foreach $categories as $cat}
                        <option value="{$cat.id}" {if condition="$cat.id == $site.category_id"}selected{/if}>{$cat.name}</option>
                        {/foreach}
                    </optgroup>
                    {/if}
                </select>
            </div>

            <div class="flex items-center gap-3">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="is_public" value="1" {if condition="$site.is_public == 1"}checked{/if} class="w-4 h-4 text-amber-600 border-gray-300 rounded focus:ring-amber-500">
                    <span class="text-sm text-gray-700">公开显示</span>
                </label>
            </div>

            <div class="flex gap-3 pt-2">
                <a href="/my" class="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm font-medium text-center hover:bg-gray-200 transition-colors duration-200 cursor-pointer">取消</a>
                <button type="submit" class="flex-1 py-2.5 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-xl text-sm font-medium hover:from-amber-600 hover:to-orange-600 shadow-sm transition-all duration-200 cursor-pointer">保存</button>
            </div>
        </form>
    </div>
</div>
{/block}

{block name="js"}
<script>
function autoFill() {
    var url = document.getElementById('siteUrl').value.trim();
    if (!url || !(url.startsWith('http://') || url.startsWith('https://'))) {
        alert('请先输入完整的网址（http/https 开头）');
        return;
    }
    var btn = document.getElementById('autoFillBtn');
    var originalHtml = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-pulse mr-1"></i>获取中...';
    btn.disabled = true;

    fetch('/api/fetch-site-meta?url=' + encodeURIComponent(url))
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.code === 0) {
                var d = res.data;
                if (d.title && !document.querySelector('[name="title"]').value) {
                    document.querySelector('[name="title"]').value = d.title;
                }
                if (d.description && !document.querySelector('[name="description"]').value) {
                    document.querySelector('[name="description"]').value = d.description;
                }
                if (d.icon_url && !document.querySelector('[name="icon_url"]').value) {
                    document.querySelector('[name="icon_url"]').value = d.icon_url;
                    var preview = document.getElementById('iconPreview');
                    if (preview) { preview.src = d.icon_url; preview.classList.remove('hidden'); }
                }
            } else {
                alert('获取失败: ' + (res.msg || '未知错误'));
            }
        })
        .catch(function() { alert('请求失败，请检查网络'); })
        .finally(function() {
            btn.innerHTML = originalHtml;
            btn.disabled = false;
        });
}
</script>
{/block}
