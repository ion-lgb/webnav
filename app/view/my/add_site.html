{extend name="layout"}

{block name="title"}添加网站 - WebNav{/block}

{block name="content"}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-6">
        <a href="/my" class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-indigo-600 transition-colors">
            <i class="fas fa-arrow-left text-xs"></i>
            <span>返回我的书签</span>
        </a>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 sm:p-8">
        <h1 class="text-xl font-bold text-gray-900 mb-6 flex items-center gap-2">
            <i class="fas fa-plus-circle text-indigo-600"></i>
            <span>添加网站</span>
        </h1>

{include file="partials/flash" /}

        <form action="/my/addSite" method="POST" class="space-y-5">
            {:token_field()}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">网站标题 <span class="text-red-500">*</span></label>
                <input type="text" name="title" required placeholder="例如：GitHub" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">网站地址 <span class="text-red-500">*</span></label>
                <div class="flex gap-2">
                    <input type="url" name="url" id="siteUrl" required placeholder="https://github.com" class="flex-1 px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
                    <button type="button" id="autoFillBtn" onclick="autoFill()" class="px-3 py-2.5 bg-gray-100 text-gray-600 text-sm rounded-lg hover:bg-gray-200 transition-colors whitespace-nowrap">
                        <i class="fas fa-wand-magic-sparkles mr-1"></i>智能填充
                    </button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">图标地址</label>
                <div class="flex items-center gap-3">
                    <input type="text" name="icon_url" id="iconUrl" placeholder="留空则自动获取" class="flex-1 px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
                    <img id="iconPreview" src="" alt="" class="w-8 h-8 rounded hidden" onerror="this.classList.add('hidden')">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">简介</label>
                <textarea name="description" rows="3" placeholder="简要描述该网站..." class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all resize-none"></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">所属分类 <span class="text-red-500">*</span></label>
                <select name="category_id" required class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all bg-white">
                    <option value="">请选择分类</option>
                    {if condition="$categories"}
                    <optgroup label="我的分类">
                        {foreach $categories as $cat}
                        <option value="{$cat.id}">{$cat.name}</option>
                        {/foreach}
                    </optgroup>
                    {/if}
                </select>
            </div>

            <div class="flex gap-3 pt-2">
                <a href="/my" class="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium text-center hover:bg-gray-200 transition-colors">取消</a>
                <button type="submit" class="flex-1 py-2.5 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors">添加</button>
            </div>
        </form>
    </div>
</div>
{/block}

{block name="js"}
<script>
function autoFill() {
    var url = document.getElementById('siteUrl').value.trim();
    if (!url || !(url.startsWith('http://') || url.startsWith('https://'))) {
        alert('请先输入完整的网址（http/https 开头）');
        return;
    }
    var btn = document.getElementById('autoFillBtn');
    var originalHtml = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-pulse mr-1"></i>获取中...';
    btn.disabled = true;

    fetch('/api/fetch-site-meta?url=' + encodeURIComponent(url))
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.code === 0) {
                var d = res.data;
                if (d.title && !document.querySelector('[name="title"]').value) {
                    document.querySelector('[name="title"]').value = d.title;
                }
                if (d.description && !document.querySelector('[name="description"]').value) {
                    document.querySelector('[name="description"]').value = d.description;
                }
                if (d.icon_url && !document.querySelector('[name="icon_url"]').value) {
                    document.querySelector('[name="icon_url"]').value = d.icon_url;
                    var preview = document.getElementById('iconPreview');
                    if (preview) { preview.src = d.icon_url; preview.classList.remove('hidden'); }
                }
            } else {
                alert('获取失败: ' + (res.msg || '未知错误'));
            }
        })
        .catch(function() { alert('请求失败，请检查网络'); })
        .finally(function() {
            btn.innerHTML = originalHtml;
            btn.disabled = false;
        });
}
</script>
{/block}
